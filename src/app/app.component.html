<div class="flex h-screen w-full bg-gray-100 font-sans">
  <!-- PANEL IZQUIERDO (Formulario) -->
  <aside class="w-1/3 min-w-[320px] max-w-sm bg-white shadow-lg p-6 flex flex-col overflow-y-auto">
    <div class="mb-6 pb-4 border-b">
      <h1 class="text-2xl font-bold text-gray-800">🧠 AI Lesson Planner</h1>
      <p class="text-xs text-gray-400 mt-1">Generador de planeaciones para clases</p>
    </div>

    <div class="flex flex-col gap-4">
      <label class="flex flex-col">
        <span class="text-sm font-semibold text-gray-600 mb-1">Materia *</span>
        <input type="text" [(ngModel)]="subject" placeholder="Ej. Matemáticas" class="px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
      </label>

      <label class="flex flex-col">
        <span class="text-sm font-semibold text-gray-600 mb-1">Grado / Nivel *</span>
        <input type="text" [(ngModel)]="gradeLevel" placeholder="Ej. 3ro de Secundaria" class="px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
      </label>

      <label class="flex flex-col">
        <span class="text-sm font-semibold text-gray-600 mb-1">Tema Principal *</span>
        <input type="text" [(ngModel)]="topic" placeholder="Ej. Ecuaciones Lineales" class="px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
      </label>

      <label class="flex flex-col">
        <span class="text-sm font-semibold text-gray-600 mb-1">Duración (minutos)</span>
        <input type="number" [(ngModel)]="duration" class="px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
      </label>

      <label class="flex flex-col">
        <span class="text-sm font-semibold text-gray-600 mb-1">Requisitos Especiales</span>
        <textarea [(ngModel)]="specialRequirements" rows="3" placeholder="Ej. Incluir actividad visual, sin tareas para casa..." class="px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none resize-none"></textarea>
      </label>

      <button
        (click)="generateLesson()"
        [disabled]="isGenerating()"
        class="mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-md transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
        @if (isGenerating()) {
          <span class="flex items-center justify-center gap-2">
            <svg class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            Generando...
          </span>
        } @else {
          <span>✨ Generar Planeación</span>
        }
      </button>

      @if (generatedLesson()) {
        <button
          (click)="downloadPDF()"
          class="mt-2 bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-md transition-colors flex items-center justify-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
          Descargar PDF
        </button>
      }
    </div>
  </aside>

  <!-- PANEL DERECHO (Lienzo/Resultado) -->
  <main class="flex-1 p-8 overflow-y-auto block bg-gray-50">
    <div class="w-full max-w-4xl mx-auto bg-white shadow-xl rounded-lg p-10 h-fit min-h-full border border-gray-100 relative">
      @if (generatedLesson()) {
        <div id="pdf-content" class="p-4 bg-white" [innerHTML]="generatedLesson()"></div>
      } @else {
        <div class="h-full flex flex-col items-center justify-center text-gray-400 opacity-60">
          <svg class="w-16 h-16 mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
          <p class="text-xl font-medium">El lienzo está en blanco</p>
          <p class="text-sm mt-2 text-center max-w-sm">Llena los datos en el panel izquierdo y presiona "Generar Planeación" para comenzar.</p>
        </div>
      }
    </div>
  </main>
</div>
